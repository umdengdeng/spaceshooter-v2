name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  EXPORT_NAME: SpaceShooter

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Godot version
        run: godot --version 2>&1 || echo "godot not found in PATH"

      - name: Setup Android SDK and export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cd ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          echo "Downloading templates from: ${TEMPLATES_URL}"
          wget -q "${TEMPLATES_URL}" -O templates.tpz
          ls -la templates.tpz
          unzip -o templates.tpz
          mv templates/* . 2>/dev/null || true
          rm -rf templates templates.tpz
          echo "=== Template files ==="
          ls -la
          mkdir -p /root/.config/godot
          cat > /root/.config/godot/editor_settings-4.tres << 'EDITOR'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/debug.keystore"
          EDITOR
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore /root/debug.keystore \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 2>/dev/null || true

      - name: List export templates
        run: |
          echo "=== Export Templates Directory ==="
          ls -la ~/.local/share/godot/export_templates/ 2>/dev/null || true
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          echo "=== Android related files ==="
          find ~/.local/share/godot -name "android*" 2>/dev/null || true
          echo "=== Debug keystore ==="
          ls -la /root/debug.keystore 2>/dev/null || echo "No debug keystore"
          echo "=== Android SDK ==="
          ls -la /usr/lib/android-sdk/ 2>/dev/null || echo "No Android SDK at /usr/lib/android-sdk"
          which adb 2>/dev/null || echo "adb not found"

      - name: Check project
        run: |
          echo "=== project.godot ==="
          cat project.godot | head -30
          echo "=== Project files ==="
          find . -name "*.tscn" -o -name "*.gd" | head -20

      - name: Create export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/SpaceShooter.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/compress_native_libraries=true
          gradle_build/export_format=0
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          package/unique_name="com.spaceshooter.game"
          package/name="SpaceShooter"
          package/signed=true
          package/app_category=0
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_permissions/0="android.permission.INTERNET"
          version/code=1
          version/name="1.0.0"
          PRESET
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          sleep 3

      - name: Build APK with full log
        continue-on-error: true
        run: |
          mkdir -p build
          echo "=== Starting build ==="
          godot --headless --export-debug "Android" build/SpaceShooter.apk 2>&1
          echo "=== Build exit code: $? ==="
          echo "=== build/ contents ==="
          ls -la build/ 2>/dev/null || echo "build/ empty or missing"
          echo "=== Find all APK files ==="
          find / -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: build-android
    if: always()
    steps:
      - name: Send email notification
        if: env.SMTP_SERVER != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          STATUS="${{ needs.build-android.result }}"
          SUBJECT="SpaceShooter Build ${STATUS}"
          BODY="Build ${STATUS} for commit ${GITHUB_SHA::7}\nRepo: ${GITHUB_REPOSITORY}\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo -e "Subject: ${SUBJECT}\nFrom: ${SMTP_USER}\nTo: ${EMAIL_TO}\n\n${BODY}" | \
            curl -s --url "smtps://${SMTP_SERVER}:${SMTP_PORT}" \
              --ssl-reqd --mail-from "${SMTP_USER}" --mail-rcpt "${EMAIL_TO}" \
              --user "${SMTP_USER}:${SMTP_PASS}" -T - || true

      - name: Skip email (no secrets)
        if: env.SMTP_SERVER == ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: echo "Email secrets not configured - skipping notification. Download APK from Artifacts or Releases."
