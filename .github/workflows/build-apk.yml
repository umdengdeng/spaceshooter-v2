name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          # Install fontconfig + JDK
          apt-get update && apt-get install -y fontconfig libfontconfig1 default-jdk-headless 2>/dev/null || true

          # Templates: copy from /root to $HOME
          TEMPLATE_SRC="/root/.local/share/godot/export_templates/4.6.1.stable"
          TEMPLATE_DST="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          mkdir -p "$TEMPLATE_DST"
          if [ -d "$TEMPLATE_SRC" ]; then
            cp -r "$TEMPLATE_SRC"/* "$TEMPLATE_DST"/
            echo "Templates copied from $TEMPLATE_SRC"
          fi
          ls "$TEMPLATE_DST"/android* 2>/dev/null || echo "WARNING: no android templates"

          # Find Java SDK (need dir with bin/javac)
          JAVA_PATH=""
          for p in /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/java-21-openjdk-amd64 /usr/lib/jvm/default-java; do
            if [ -f "$p/bin/javac" ]; then
              JAVA_PATH="$p"
              break
            fi
          done
          if [ -z "$JAVA_PATH" ]; then
            JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac 2>/dev/null) 2>/dev/null) 2>/dev/null) 2>/dev/null || echo "")
          fi
          echo "Java SDK: $JAVA_PATH"
          ls "$JAVA_PATH/bin/javac" 2>/dev/null && echo "javac OK" || echo "WARNING: javac not found"

          # Find Android SDK
          ANDROID_PATH=""
          for p in /usr/lib/android-sdk /root/android-sdk /opt/android-sdk; do
            if [ -d "$p/build-tools" ]; then
              ANDROID_PATH="$p"
              break
            fi
          done
          echo "Android SDK: $ANDROID_PATH"
          ls "$ANDROID_PATH/build-tools/" 2>/dev/null || echo "no build-tools"

          # Debug keystore
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US" 2>/dev/null || true

          # Editor settings (no leading whitespace!)
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings"]\n[resource]\nexport/android/java_sdk_path = "%s"\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s/.android/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$JAVA_PATH" "$ANDROID_PATH" "$HOME" \
            > "$HOME/.config/godot/editor_settings-4.6.tres"
          echo "=== Editor settings ==="
          cat "$HOME/.config/godot/editor_settings-4.6.tres"

      - name: Generate export presets
        run: |
          # Godot import
          godot --headless --import 2>&1 || true
          sleep 3

          # export_presets.cfg (target_sdk=33 to match available build-tools)
          cat > export_presets.cfg << 'PRESET'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          advanced_options=false
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path=""
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          script_encryption_key=""
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          version/code=1
          version/name="1.0.0"
          package/unique_name="com.game.spaceshooter"
          package/name="SpaceShooter"
          package/signed=true
          package/app_category=2
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_permissions/0="android.permission.INTERNET"
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          PRESET

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/SpaceShooter.apk 2>&1

      - name: Verify
        run: |
          if [ -f build/SpaceShooter.apk ]; then
            echo "빌드 성공! $(du -h build/SpaceShooter.apk | cut -f1)"
          else
            echo "빌드 실패"
            find / -name "*.apk" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
