name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    env:
      HOME: /root

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          # Install fontconfig
          apt-get update && apt-get install -y fontconfig libfontconfig1 2>/dev/null || true

          # Verify templates exist (already at /root in this image)
          ls /root/.local/share/godot/export_templates/4.6.1.stable/android_debug.apk && echo "Templates OK"

          # Find Java SDK
          JAVA_PATH=""
          for p in /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/java-21-openjdk-amd64 /usr/lib/jvm/default-java; do
            if [ -f "$p/bin/javac" ]; then
              JAVA_PATH="$p"
              break
            fi
          done
          # Fallback: install JDK if not found
          if [ -z "$JAVA_PATH" ]; then
            apt-get install -y default-jdk-headless 2>/dev/null || true
            for p in /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/java-21-openjdk-amd64 /usr/lib/jvm/default-java; do
              if [ -f "$p/bin/javac" ]; then
                JAVA_PATH="$p"
                break
              fi
            done
          fi
          echo "Java SDK: $JAVA_PATH"

          # Find Android SDK
          ANDROID_PATH=""
          for p in /usr/lib/android-sdk /root/android-sdk /opt/android-sdk; do
            if [ -d "$p/build-tools" ]; then
              ANDROID_PATH="$p"
              break
            fi
          done
          echo "Android SDK: $ANDROID_PATH"
          echo "Build tools:" && ls "$ANDROID_PATH/build-tools/" 2>/dev/null
          echo "d8 check:" && find "$ANDROID_PATH" -name "d8" 2>/dev/null | head -3

          # Debug keystore
          mkdir -p /root/.android
          keytool -genkey -v \
            -keystore /root/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US" 2>/dev/null || true

          # Editor settings (try both possible filenames)
          mkdir -p /root/.config/godot
          for fname in editor_settings-4.tres editor_settings-4.6.tres; do
            printf '[gd_resource type="EditorSettings"]\n[resource]\nexport/android/java_sdk_path = "%s"\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "/root/.android/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
              "$JAVA_PATH" "$ANDROID_PATH" \
              > "/root/.config/godot/$fname"
          done
          echo "=== Editor settings ==="
          cat /root/.config/godot/editor_settings-4.tres

          # Verify export_presets.cfg from repo
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
          echo "=== hex check first line ==="
          head -1 export_presets.cfg | xxd | head -2

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          sleep 3

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/SpaceShooter.apk --verbose 2>&1 | tail -100

      - name: Verify
        if: always()
        run: |
          if [ -f build/SpaceShooter.apk ]; then
            echo "빌드 성공! $(du -h build/SpaceShooter.apk | cut -f1)"
          else
            echo "빌드 실패"
            find / -name "*.apk" -not -path "*/export_templates/*" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
