name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create export presets
        run: |
          printf '[preset.0]\n\nname="Linux"\nplatform="Linux"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path=""\nencryption_include_filters=""\nencryption_exclude_filters=""\nscript_export_mode=1\n\n[preset.0.options]\n\ncustom_template/debug=""\ncustom_template/release=""\nbinary_format/embed_pck=false\n' > export_presets.cfg

      - name: Import project
        run: |
          godot --headless --editor --quit 2>&1 || true
          sleep 5
          godot --headless --import 2>&1 || true
          sleep 3

          echo "=== Import result ==="
          find .godot -type f 2>/dev/null | wc -l
          du -sh .godot 2>/dev/null || echo "No .godot folder"

      - name: Export PCK
        run: |
          mkdir -p build
          godot --headless --export-pack "Linux" build/game.pck 2>&1

          PCK_SIZE=$(stat -c%s build/game.pck 2>/dev/null || echo 0)
          echo "PCK size: $(du -h build/game.pck)"
          echo "PCK bytes: $PCK_SIZE"

      - name: Build APK with embedded PCK
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"

          # Embed PCK at end of APK using Godot's embed format
          python3 .github/embed_pck.py \
            "$TEMPLATE_DIR/android_debug.apk" \
            build/game.pck \
            build/SpaceShooter_unsigned.apk

      - name: Sign and align APK
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"

          # Sign first (v1 jarsigner for appended-PCK APK since zipalign may break the append)
          jarsigner -keystore debug.keystore \
            -storepass android -keypass android \
            -signedjar build/SpaceShooter.apk \
            build/SpaceShooter_unsigned.apk \
            androiddebugkey
          echo "signing done"

      - name: Verify APK
        run: |
          APK=build/SpaceShooter.apk
          echo "APK: $APK"
          echo "Size: $(du -h $APK | cut -f1)"

          jarsigner -verify $APK && echo "Signature: OK" || echo "Signature: FAILED"

          echo "--- PCK embed check ---"
          python3 .github/verify_pck_embed.py $APK

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Send download link via email
        if: success()
        run: python3 .github/send_email.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
