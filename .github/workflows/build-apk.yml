name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  EXPORT_NAME: SpaceShooter

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig libfontconfig1 wget unzip

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -o templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          rm -rf templates templates.tpz
          echo "=== Template folder ==="
          ls ~/.local/share/godot/export_templates/
          echo "=== Template files (android) ==="
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android* 2>/dev/null || echo "no android templates"
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ | grep -i android || echo "no android match"

      - name: Create debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore ${GITHUB_WORKSPACE}/debug.keystore \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999
          echo "=== Keystore ==="
          ls -la ${GITHUB_WORKSPACE}/debug.keystore
          keytool -list -keystore ${GITHUB_WORKSPACE}/debug.keystore -storepass android 2>&1 || true

      - name: Configure Godot editor settings
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          mkdir -p ~/.config/godot/
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "${GITHUB_WORKSPACE}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Create export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path=""
          patches=[]
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          script_export_mode=1

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          version/code=1
          version/name="1.0.0"
          package/unique_name="com.game.spaceshooter"
          package/name="SpaceShooter"
          package/signed=true
          package/classify_as_game=true
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_permissions/0="android.permission.INTERNET"
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          permissions/internet=true
          PRESET
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          sleep 3

      - name: Debug export config
        run: |
          echo "=== Java ==="
          java -version 2>&1
          echo "=== Android SDK build-tools ==="
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"
          echo "=== Android SDK platforms ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          echo "=== Template folder check ==="
          ls ~/.local/share/godot/export_templates/
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ | head -10
          echo "=== Dry run verbose ==="
          godot --headless --export-debug "Android" /dev/null --verbose 2>&1 | tail -50 || true

      - name: Build APK
        continue-on-error: true
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/SpaceShooter.apk 2>&1
          echo "Exit code: $?"

      - name: Find APK
        if: always()
        run: |
          echo "=== build/ ==="
          ls -la build/ 2>/dev/null || echo "build/ empty"
          echo "=== Find APK anywhere ==="
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null || echo "No APK"
          find /tmp -name "*.apk" -type f 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk
          if-no-files-found: warn

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: build-android
    if: always()
    steps:
      - name: Send email notification
        if: env.SMTP_SERVER != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          STATUS="${{ needs.build-android.result }}"
          SUBJECT="SpaceShooter Build ${STATUS}"
          BODY="Build ${STATUS} for commit ${GITHUB_SHA::7}\nRepo: ${GITHUB_REPOSITORY}\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo -e "Subject: ${SUBJECT}\nFrom: ${SMTP_USER}\nTo: ${EMAIL_TO}\n\n${BODY}" | \
            curl -s --url "smtps://${SMTP_SERVER}:${SMTP_PORT}" \
              --ssl-reqd --mail-from "${SMTP_USER}" --mail-rcpt "${EMAIL_TO}" \
              --user "${SMTP_USER}:${SMTP_PASS}" -T - || true

      - name: Skip email (no secrets)
        if: env.SMTP_SERVER == ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: echo "Email secrets not configured - skipping."
