name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create export presets
        run: |
          printf '[preset.0]\n\nname="Linux"\nplatform="Linux"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path=""\nencryption_include_filters=""\nencryption_exclude_filters=""\nscript_export_mode=1\n\n[preset.0.options]\n\ncustom_template/debug=""\ncustom_template/release=""\nbinary_format/embed_pck=false\n' > export_presets.cfg

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export PCK
        run: |
          mkdir -p build
          godot --headless --export-pack "Linux" build/game.pck 2>&1

      - name: Build APK from template
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable"
          cp "$TEMPLATE_DIR/android_debug.apk" build/SpaceShooter.apk

          # Godot Android looks for PCK in assets/ inside the APK
          cd build
          mkdir -p assets
          cp game.pck assets/
          zip -0 SpaceShooter.apk assets/game.pck
          echo "APK size: $(du -h SpaceShooter.apk | cut -f1)"
          echo "PCK size: $(du -h game.pck | cut -f1)"

      - name: Sign and align APK
        run: |
          # Create debug keystore
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          # Find build-tools
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"

          # Zipalign (required before apksigner)
          ${BUILD_TOOLS}zipalign -f 4 build/SpaceShooter.apk build/SpaceShooter_aligned.apk
          mv build/SpaceShooter_aligned.apk build/SpaceShooter.apk
          echo "zipalign done"

          # Sign with apksigner
          ${BUILD_TOOLS}apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            build/SpaceShooter.apk
          echo "signing done"

      - name: Verify APK
        run: |
          APK=build/SpaceShooter.apk
          echo "APK: $APK"
          echo "Size: $(du -h $APK | cut -f1)"

          # Check ZIP structure
          unzip -t $APK > /dev/null 2>&1 && echo "ZIP structure: OK" || echo "ZIP structure: DAMAGED"

          # Check signature
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          ${BUILD_TOOLS}apksigner verify --print-certs $APK && echo "Signature: OK" || echo "Signature: FAILED"

          # Check PCK is inside
          echo "--- PCK check ---"
          unzip -l $APK | grep -i pck && echo "PCK found in APK" || echo "WARNING: No PCK in APK!"

          # List APK contents
          echo "--- APK contents (first 25) ---"
          unzip -l $APK | head -25

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Send download link via email
        if: success()
        run: python3 .github/send_email.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
