name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager --install "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/java_sdk_path = "%s"\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s/.android/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$JAVA_HOME" "$ANDROID_HOME" "$HOME" \
            > ~/.config/godot/editor_settings-4.6.tres
          cat ~/.config/godot/editor_settings-4.6.tres

      - name: Create export preset
        run: |
          printf '[preset.0]\n\nname="Android"\nplatform="Android"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path=""\nencryption_include_filters=""\nencryption_exclude_filters=""\nscript_export_mode=1\n\n[preset.0.options]\n\ncustom_template/debug=""\ncustom_template/release=""\ngradle_build/use_gradle_build=false\ngradle_build/export_format=0\narchitectures/armeabi-v7a=true\narchitectures/arm64-v8a=true\nversion/code=1\nversion/name="1.0.0"\npackage/unique_name="com.game.spaceshooter"\npackage/name="SpaceShooter"\npackage/signed=false\nscreen/immersive_mode=true\nscreen/support_small=true\nscreen/support_normal=true\nscreen/support_large=true\nscreen/support_xlarge=true\n' > export_presets.cfg
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
          echo "=== file check ==="
          file export_presets.cfg
          od -An -tx1 export_presets.cfg | head -3

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/SpaceShooter.apk 2>&1

      - name: Verify
        if: always()
        run: |
          if [ -f build/SpaceShooter.apk ]; then
            echo "APK 빌드 성공! $(du -h build/SpaceShooter.apk | cut -f1)"
          else
            echo "APK 빌드 실패"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
