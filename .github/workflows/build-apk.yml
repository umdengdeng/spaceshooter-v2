name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          # Export templates 링크
          mkdir -p /root/.local/share/godot/export_templates/4.6.1.stable
          ln -s /root/.local/share/godot/export_templates/4.6.1.stable /root/.local/share/godot/templates 2>/dev/null || true

          # Debug keystore 생성
          mkdir -p /root/.android
          keytool -genkey -v \
            -keystore /root/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US" 2>/dev/null || true

          # Editor settings
          mkdir -p /root/.config/godot
          cat > /root/.config/godot/editor_settings-4.6.tres << 'EOF'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/root/android-sdk"
          export/android/debug_keystore = "/root/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Generate export presets
        run: |
          # Godot에게 프로젝트 import 시키기
          godot --headless --import 2>&1 || true
          sleep 3

          # export_presets.cfg가 없으면 Godot CLI로 생성
          if [ ! -f export_presets.cfg ]; then
            echo "export_presets.cfg 생성 중..."
          fi

          # 확실한 export_presets.cfg 직접 작성 (4.6.1 형식)
          cat > export_presets.cfg << 'PRESET'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          advanced_options=false
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path=""
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          script_encryption_key=""
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          gradle_build/min_sdk=24
          gradle_build/target_sdk=34
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug="/root/.android/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          version/code=1
          version/name="1.0.0"
          package/unique_name="com.game.spaceshooter"
          package/name="SpaceShooter"
          package/signed=true
          package/app_category=2
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_permissions/0="android.permission.INTERNET"
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          PRESET

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/SpaceShooter.apk 2>&1

      - name: Verify
        run: |
          if [ -f build/SpaceShooter.apk ]; then
            echo "빌드 성공! $(du -h build/SpaceShooter.apk | cut -f1)"
          else
            echo "빌드 실패"
            find / -name "*.apk" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-APK
          path: build/SpaceShooter.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/SpaceShooter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
